services:
  - type: web
    name: ai-powered-sdss
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port 8080 --workers 1"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: APP_HOST
        value: "0.0.0.0"
      - key: APP_PORT
        value: "8080"
      - key: ALLOWED_ORIGINS
        value: "*"
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
