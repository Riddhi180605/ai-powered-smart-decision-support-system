<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Analysis Tool</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📊 Data Analysis Tool</h1>
            <p>Upload your CSV or Excel file to analyze the dataset</p>
        </div>

        <div class="main-content">
            <div class="upload-section">
                <div class="upload-box" id="uploadBox">
                    <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="17 8 12 3 7 8"></polyline>
                        <line x1="12" y1="3" x2="12" y2="15"></line>
                    </svg>
                    <h2>Drag & Drop Your File</h2>
                    <p>or click to browse</p>
                    <input type="file" id="fileInput" accept=".csv,.xlsx,.xls" style="display: none;">
                </div>

                <div class="file-info" id="fileInfo" style="display: none;">
                    <p><strong>Selected File:</strong> <span id="fileName"></span></p>
                    <button class="btn btn-primary" id="uploadBtn">Upload & Analyze</button>
                    <button class="btn btn-secondary" id="changeFileBtn">Change File</button>
                </div>

                <div class="loading" id="loading" style="display: none;">
                    <div class="spinner"></div>
                    <p>Processing your file...</p>
                </div>

                <div class="error-message" id="errorMessage" style="display: none;"></div>
            </div>
        </div>

        <div class="footer">
            <p>Supported formats: CSV, XLSX, XLS</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
